<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPSI PackForge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #ccc;
            line-height: 1.5;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 5px; }
        .sub { color: #666; margin-bottom: 30px; }

        section {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 15px;
        }
        section h2 {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .row > * { flex: 1; }

        .label-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        label { font-size: 13px; color: #888; }

        .info-btn {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #333;
            color: #888;
            font-size: 11px;
            border: none;
            cursor: help;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .info-btn:hover { background: #444; color: #fff; }
        .info-btn .tooltip {
            display: none;
            position: absolute;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: #fff;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 12px;
            white-space: nowrap;
            z-index: 100;
            font-weight: normal;
        }
        .info-btn:hover .tooltip { display: block; }

        input, select, textarea {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            color: #fff;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0af;
        }
        textarea { resize: vertical; min-height: 60px; }

        .types { display: flex; flex-wrap: wrap; gap: 8px; }
        .type-btn {
            background: #222;
            border: 1px solid #444;
            padding: 8px 16px;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
        }
        .type-btn:hover { border-color: #666; }
        .type-btn.active { border-color: #0af; color: #0af; }

        .params-container {
            margin-top: 12px;
            padding: 12px;
            background: #0a1a1a;
            border-left: 3px solid #0af;
            min-height: 44px;
        }
        .params-label {
            font-size: 11px;
            color: #666;
            margin-bottom: 8px;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .tag {
            background: #1a3a4a;
            border: 1px solid #0af;
            color: #0af;
            padding: 4px 8px;
            border-radius: 3px;
            font-family: monospace;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .tag .remove {
            cursor: pointer;
            opacity: 0.6;
            font-size: 14px;
        }
        .tag .remove:hover { opacity: 1; }
        .add-tag {
            background: #222;
            border: 1px dashed #444;
            color: #666;
            padding: 4px 10px;
            border-radius: 3px;
            font-size: 12px;
            cursor: pointer;
        }
        .add-tag:hover { border-color: #666; color: #888; }

        .dropzone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 15px;
        }
        .dropzone:hover, .dropzone.dragover {
            border-color: #0af;
            background: rgba(0, 170, 255, 0.05);
        }
        .dropzone-icon { font-size: 32px; margin-bottom: 10px; }
        .dropzone-text { color: #888; font-size: 14px; }
        .dropzone-text span { color: #0af; }
        .dropzone-hint { color: #555; font-size: 12px; margin-top: 5px; }

        .file-info {
            display: none;
            background: #1a2a1a;
            border: 1px solid #0a0;
            padding: 12px;
            border-radius: 4px;
            margin-top: 15px;
        }
        .file-info.visible { display: flex; align-items: center; gap: 12px; }
        .file-icon { font-size: 24px; }
        .file-details { flex: 1; }
        .file-name { color: #fff; font-weight: 500; }
        .file-size { color: #666; font-size: 12px; }
        .file-remove {
            background: none;
            border: none;
            color: #666;
            font-size: 18px;
            cursor: pointer;
        }
        .file-remove:hover { color: #f55; }

        .actions { display: flex; gap: 10px; margin-top: 20px; }
        button {
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #0af; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #0cf; }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-secondary:hover { background: #444; }

        .preview {
            background: #0a0a0a;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre;
            overflow-x: auto;
            color: #0a0;
            display: none;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        footer { text-align: center; color: #444; margin-top: 30px; font-size: 13px; }
        footer a { color: #0af; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OPSI PackForge</h1>
        <p class="sub">Create OPSI package structure</p>

        <section>
            <h2>Package Info</h2>
            <div class="row">
                <div>
                    <div class="label-row">
                        <label>Package ID</label>
                        <button class="info-btn">?<span class="tooltip">Unique identifier, lowercase, no spaces (e.g. firefox, vlc-player)</span></button>
                    </div>
                    <input type="text" id="pkgId" placeholder="firefox">
                </div>
                <div>
                    <div class="label-row">
                        <label>Name</label>
                        <button class="info-btn">?<span class="tooltip">Display name shown in OPSI</span></button>
                    </div>
                    <input type="text" id="pkgName" placeholder="Mozilla Firefox">
                </div>
            </div>
            <div class="row">
                <div>
                    <div class="label-row">
                        <label>Version</label>
                        <button class="info-btn">?<span class="tooltip">Package version (e.g. 1.0.0, 2.1.3)</span></button>
                    </div>
                    <input type="text" id="pkgVersion" value="1.0.0">
                </div>
                <div>
                    <div class="label-row">
                        <label>Priority</label>
                        <button class="info-btn">?<span class="tooltip">Installation priority 0-100. Higher = installs first</span></button>
                    </div>
                    <input type="number" id="pkgPriority" value="0" min="0" max="100">
                </div>
            </div>
            <div>
                <div class="label-row">
                    <label>Description</label>
                </div>
                <textarea id="pkgDesc" placeholder="Optional"></textarea>
            </div>
        </section>

        <section>
            <h2>Installer Type</h2>
            <div class="types">
                <button class="type-btn" data-type="msi" data-params="msiexec,/i,/qn,/norestart">MSI</button>
                <button class="type-btn" data-type="inno" data-params="/VERYSILENT,/SUPPRESSMSGBOXES,/NORESTART">InnoSetup</button>
                <button class="type-btn" data-type="nsis" data-params="/S">NSIS</button>
                <button class="type-btn" data-type="installshield" data-params="/s,/sms">InstallShield</button>
                <button class="type-btn" data-type="exe" data-params="">EXE (custom)</button>
                <button class="type-btn" data-type="ps1" data-params="powershell,-ExecutionPolicy,Bypass,-File">PowerShell</button>
            </div>

            <div class="params-container" id="paramsContainer">
                <div class="params-label">COMMAND PARAMETERS (click to remove, + to add)</div>
                <div class="tags" id="tagsContainer">
                    <span style="color:#666; font-size:13px;">Select installer type above</span>
                </div>
            </div>

            <div class="dropzone" id="dropzone">
                <div class="dropzone-icon">📁</div>
                <div class="dropzone-text">Drag & drop installer file or <span>browse</span></div>
                <div class="dropzone-hint">.exe, .msi, .ps1, .bat supported</div>
            </div>
            <input type="file" id="fileInput" accept=".exe,.msi,.ps1,.bat,.cmd" style="display:none">

            <div class="file-info" id="fileInfo">
                <div class="file-icon">📦</div>
                <div class="file-details">
                    <div class="file-name" id="fileName">setup.exe</div>
                    <div class="file-size" id="fileSize">2.4 MB</div>
                </div>
                <button class="file-remove" onclick="removeFile()">×</button>
            </div>
        </section>

        <div class="actions">
            <button class="btn-secondary" onclick="preview()">Preview</button>
            <button class="btn-primary" onclick="download()">Download .zip</button>
        </div>

        <pre class="preview" id="preview"></pre>

        <footer>
            <a href="https://github.com/Elliot-Markus-John-Adams/opsi-packforge">GitHub</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let selectedType = null;
        let currentParams = [];
        let selectedFile = null;

        // Installer type buttons
        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;

                const params = btn.dataset.params ? btn.dataset.params.split(',') : [];
                currentParams = [...params];
                renderTags();
            };
        });

        function renderTags() {
            const container = document.getElementById('tagsContainer');
            container.innerHTML = '';

            currentParams.forEach((param, i) => {
                const tag = document.createElement('span');
                tag.className = 'tag';
                tag.innerHTML = `${param}<span class="remove" onclick="removeParam(${i})">×</span>`;
                container.appendChild(tag);
            });

            const addBtn = document.createElement('span');
            addBtn.className = 'add-tag';
            addBtn.textContent = '+';
            addBtn.onclick = addParam;
            container.appendChild(addBtn);
        }

        function removeParam(index) {
            currentParams.splice(index, 1);
            renderTags();
        }

        function addParam() {
            const param = prompt('Enter parameter (e.g. /silent):');
            if (param && param.trim()) {
                currentParams.push(param.trim());
                renderTags();
            }
        }

        // Drag and drop
        const dropzone = document.getElementById('dropzone');
        const fileInput = document.getElementById('fileInput');

        dropzone.onclick = () => fileInput.click();

        dropzone.ondragover = (e) => {
            e.preventDefault();
            dropzone.classList.add('dragover');
        };

        dropzone.ondragleave = () => {
            dropzone.classList.remove('dragover');
        };

        dropzone.ondrop = (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                handleFile(e.dataTransfer.files[0]);
            }
        };

        fileInput.onchange = () => {
            if (fileInput.files.length) {
                handleFile(fileInput.files[0]);
            }
        };

        function handleFile(file) {
            selectedFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = formatSize(file.size);
            document.getElementById('fileInfo').classList.add('visible');
            dropzone.style.display = 'none';

            // Auto-detect installer type
            const ext = file.name.split('.').pop().toLowerCase();
            const typeMap = { msi: 'msi', exe: 'exe', ps1: 'ps1', bat: 'exe', cmd: 'exe' };
            const type = typeMap[ext];
            if (type) {
                document.querySelectorAll('.type-btn').forEach(btn => {
                    if (btn.dataset.type === type) btn.click();
                });
            }
        }

        function removeFile() {
            selectedFile = null;
            document.getElementById('fileInfo').classList.remove('visible');
            dropzone.style.display = 'block';
            fileInput.value = '';
        }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function getData() {
            return {
                id: document.getElementById('pkgId').value.trim(),
                name: document.getElementById('pkgName').value.trim(),
                version: document.getElementById('pkgVersion').value.trim() || '1.0.0',
                priority: document.getElementById('pkgPriority').value || '0',
                desc: document.getElementById('pkgDesc').value.trim(),
                setupFile: selectedFile ? selectedFile.name : 'setup.exe',
                type: selectedType,
                params: currentParams.join(' ')
            };
        }

        function makeControl(d) {
            return `[Package]
version: 1
depends:
incremental: False

[Product]
type: localboot
id: ${d.id}
name: ${d.name}
description: ${d.desc || d.name}
advice:
version: ${d.version}
priority: ${d.priority}
licenseRequired: False
productClasses:
setupScript: setup.opsiscript
uninstallScript: uninstall.opsiscript
updateScript:
alwaysScript:
onceScript:`;
        }

        function makeSetup(d) {
            let install = '';
            const params = d.params ? d.params + ' ' : '';

            if (d.type === 'ps1') {
                install = `ShellCall_install

[ShellCall_install]
${params}"$SetupFile$"`;
            } else {
                install = `Winbatch_install

[Winbatch_install]
${params}"$SetupFile$"`;
            }

            return `; ${d.name} - setup script

[Actions]
requiredWinstVersion >= "4.11.6"

DefVar $SetupFile$
DefVar $ProductId$
DefVar $ExitCode$

Set $ProductId$ = "${d.id}"
Set $SetupFile$ = "%ScriptPath%\\files\\${d.setupFile}"

Message "Installing " + $ProductId$

ChangeDirectory "%ScriptPath%\\files"
${install}
Sub_check_exitcode

[Sub_check_exitcode]
set $ExitCode$ = getLastExitCode
if ($ExitCode$ = "0")
    comment "OK"
else
    logError "Failed: " + $ExitCode$
    isFatalError
endif`;
        }

        function makeUninstall(d) {
            return `; ${d.name} - uninstall script

[Actions]
Message "Uninstalling ${d.name}"

; TODO: add uninstall commands`;
        }

        function preview() {
            const d = getData();
            if (!d.id || !d.name) { alert('Enter package ID and name'); return; }
            const el = document.getElementById('preview');
            el.textContent = '=== OPSI/control ===\n\n' + makeControl(d) +
                '\n\n=== CLIENT_DATA/setup.opsiscript ===\n\n' + makeSetup(d);
            el.style.display = 'block';
        }

        async function download() {
            const d = getData();
            if (!d.id || !d.name) { alert('Enter package ID and name'); return; }
            if (!selectedType) { alert('Select installer type'); return; }

            const zip = new JSZip();
            const folder = d.id + '_' + d.version;

            zip.folder(folder + '/OPSI');
            zip.folder(folder + '/CLIENT_DATA/files');
            zip.file(folder + '/OPSI/control', makeControl(d));
            zip.file(folder + '/CLIENT_DATA/setup.opsiscript', makeSetup(d));
            zip.file(folder + '/CLIENT_DATA/uninstall.opsiscript', makeUninstall(d));

            // Include the actual file if selected
            if (selectedFile) {
                const fileData = await selectedFile.arrayBuffer();
                zip.file(folder + '/CLIENT_DATA/files/' + selectedFile.name, fileData);
            }

            const blob = await zip.generateAsync({type: 'blob'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = folder + '.zip';
            a.click();
        }
    </script>
</body>
</html>
