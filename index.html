<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPSI PackForge</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #111;
            color: #ccc;
            line-height: 1.5;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        h1 { color: #fff; margin-bottom: 5px; }
        .sub { color: #666; margin-bottom: 30px; }

        section {
            background: #1a1a1a;
            border: 1px solid #333;
            padding: 20px;
            margin-bottom: 15px;
        }
        section h2 {
            font-size: 14px;
            text-transform: uppercase;
            color: #888;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .row { display: flex; gap: 15px; margin-bottom: 12px; }
        .row > * { flex: 1; }

        label { display: block; font-size: 13px; color: #888; margin-bottom: 4px; }
        input, select, textarea {
            width: 100%;
            background: #222;
            border: 1px solid #444;
            padding: 10px;
            color: #fff;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #0af;
        }
        textarea { resize: vertical; min-height: 60px; }
        select { cursor: pointer; }

        .types { display: flex; flex-wrap: wrap; gap: 8px; }
        .type-btn {
            background: #222;
            border: 1px solid #444;
            padding: 8px 16px;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
        }
        .type-btn:hover { border-color: #666; }
        .type-btn.active { border-color: #0af; color: #0af; }

        .params {
            margin-top: 12px;
            padding: 10px;
            background: #0a1a1a;
            border-left: 3px solid #0af;
            font-family: monospace;
            font-size: 13px;
            color: #0af;
        }

        .actions { display: flex; gap: 10px; margin-top: 20px; }
        button {
            padding: 12px 24px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .btn-primary { background: #0af; color: #000; font-weight: 600; }
        .btn-primary:hover { background: #0cf; }
        .btn-secondary { background: #333; color: #ccc; }
        .btn-secondary:hover { background: #444; }

        .preview {
            background: #0a0a0a;
            padding: 15px;
            font-family: monospace;
            font-size: 12px;
            white-space: pre;
            overflow-x: auto;
            color: #0a0;
            display: none;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        footer { text-align: center; color: #444; margin-top: 30px; font-size: 13px; }
        footer a { color: #0af; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>OPSI PackForge</h1>
        <p class="sub">Create OPSI package structure</p>

        <section>
            <h2>Package Info</h2>
            <div class="row">
                <div>
                    <label>Package ID</label>
                    <input type="text" id="pkgId" placeholder="firefox">
                </div>
                <div>
                    <label>Name</label>
                    <input type="text" id="pkgName" placeholder="Mozilla Firefox">
                </div>
            </div>
            <div class="row">
                <div>
                    <label>Version</label>
                    <input type="text" id="pkgVersion" value="1.0.0">
                </div>
                <div>
                    <label>Priority</label>
                    <input type="number" id="pkgPriority" value="0" min="0" max="100">
                </div>
            </div>
            <div>
                <label>Description</label>
                <textarea id="pkgDesc" placeholder="Optional"></textarea>
            </div>
        </section>

        <section>
            <h2>Installer Type</h2>
            <div class="types">
                <button class="type-btn" data-type="msi" data-params="/qn /norestart">MSI</button>
                <button class="type-btn" data-type="inno" data-params="/VERYSILENT /SUPPRESSMSGBOXES /NORESTART">InnoSetup</button>
                <button class="type-btn" data-type="nsis" data-params="/S">NSIS</button>
                <button class="type-btn" data-type="installshield" data-params="/s /sms">InstallShield</button>
                <button class="type-btn" data-type="exe" data-params="">EXE (custom)</button>
                <button class="type-btn" data-type="ps1" data-params="">PowerShell</button>
            </div>
            <div class="params" id="paramDisplay">Select installer type</div>
            <div class="row" style="margin-top: 12px;">
                <div>
                    <label>Setup filename</label>
                    <input type="text" id="setupFile" placeholder="setup.exe">
                </div>
                <div id="customParamGroup" style="display:none;">
                    <label>Custom params</label>
                    <input type="text" id="customParams" placeholder="/silent /norestart">
                </div>
            </div>
        </section>

        <div class="actions">
            <button class="btn-secondary" onclick="preview()">Preview</button>
            <button class="btn-primary" onclick="download()">Download .zip</button>
        </div>

        <pre class="preview" id="preview"></pre>

        <footer>
            <a href="https://github.com/Elliot-Markus-John-Adams/opsi-packforge">GitHub</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        let selectedType = null;
        let silentParams = '';

        document.querySelectorAll('.type-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedType = btn.dataset.type;
                silentParams = btn.dataset.params;

                const display = document.getElementById('paramDisplay');
                if (selectedType === 'msi') {
                    display.textContent = 'msiexec /i setup.msi ' + silentParams;
                } else if (selectedType === 'ps1') {
                    display.textContent = 'powershell -ExecutionPolicy Bypass -File setup.ps1';
                } else if (silentParams) {
                    display.textContent = 'setup.exe ' + silentParams;
                } else {
                    display.textContent = 'setup.exe [your params]';
                }

                document.getElementById('customParamGroup').style.display =
                    selectedType === 'exe' ? 'block' : 'none';
            };
        });

        function getData() {
            return {
                id: document.getElementById('pkgId').value.trim(),
                name: document.getElementById('pkgName').value.trim(),
                version: document.getElementById('pkgVersion').value.trim() || '1.0.0',
                priority: document.getElementById('pkgPriority').value || '0',
                desc: document.getElementById('pkgDesc').value.trim(),
                setupFile: document.getElementById('setupFile').value.trim() || 'setup.exe',
                type: selectedType,
                params: selectedType === 'exe' ?
                    document.getElementById('customParams').value.trim() : silentParams
            };
        }

        function makeControl(d) {
            return `[Package]
version: 1
depends:
incremental: False

[Product]
type: localboot
id: ${d.id}
name: ${d.name}
description: ${d.desc || d.name}
advice:
version: ${d.version}
priority: ${d.priority}
licenseRequired: False
productClasses:
setupScript: setup.opsiscript
uninstallScript: uninstall.opsiscript
updateScript:
alwaysScript:
onceScript:`;
        }

        function makeSetup(d) {
            let install = '';
            if (d.type === 'msi') {
                install = `Winbatch_install

[Winbatch_install]
msiexec /i "$SetupFile$" /qn /norestart`;
            } else if (d.type === 'ps1') {
                install = `ShellCall_install

[ShellCall_install]
powershell.exe -ExecutionPolicy Bypass -File "$SetupFile$"`;
            } else {
                const p = d.params ? ' ' + d.params : '';
                install = `Winbatch_install

[Winbatch_install]
"$SetupFile$"${p}`;
            }

            return `; ${d.name} - setup script

[Actions]
requiredWinstVersion >= "4.11.6"

DefVar $SetupFile$
DefVar $ProductId$
DefVar $ExitCode$

Set $ProductId$ = "${d.id}"
Set $SetupFile$ = "%ScriptPath%\\files\\${d.setupFile}"

Message "Installing " + $ProductId$

ChangeDirectory "%ScriptPath%\\files"
${install}
Sub_check_exitcode

[Sub_check_exitcode]
set $ExitCode$ = getLastExitCode
if ($ExitCode$ = "0")
    comment "OK"
else
    logError "Failed: " + $ExitCode$
    isFatalError
endif`;
        }

        function makeUninstall(d) {
            return `; ${d.name} - uninstall script

[Actions]
Message "Uninstalling ${d.name}"

; TODO: add uninstall commands`;
        }

        function preview() {
            const d = getData();
            if (!d.id || !d.name) { alert('Enter package ID and name'); return; }
            const el = document.getElementById('preview');
            el.textContent = '=== OPSI/control ===\n\n' + makeControl(d) +
                '\n\n=== CLIENT_DATA/setup.opsiscript ===\n\n' + makeSetup(d);
            el.style.display = 'block';
        }

        async function download() {
            const d = getData();
            if (!d.id || !d.name) { alert('Enter package ID and name'); return; }
            if (!selectedType) { alert('Select installer type'); return; }

            const zip = new JSZip();
            const folder = d.id + '_' + d.version;

            zip.folder(folder + '/OPSI');
            zip.folder(folder + '/CLIENT_DATA/files');
            zip.file(folder + '/OPSI/control', makeControl(d));
            zip.file(folder + '/CLIENT_DATA/setup.opsiscript', makeSetup(d));
            zip.file(folder + '/CLIENT_DATA/uninstall.opsiscript', makeUninstall(d));

            const blob = await zip.generateAsync({type: 'blob'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = folder + '.zip';
            a.click();
        }
    </script>
</body>
</html>
